name: Release APK

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE }}" | base64 -d > app/release.keystore

      - name: Debug Keystore Location
        run: |
          echo "Current directory: $(pwd)"
          echo "---"
          echo "Files in project root:"
          ls -la
          echo "---"
          echo "Files in app/ directory:"
          ls -la app/
          echo "---"
          echo "Keystore file details:"
          file app/release.keystore || echo "Keystore NOT FOUND in app/"
          ls -la app/release.keystore || echo ""

      - name: Build Release APK
        env:
          KEYSTORE_PATH: app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/FreeStyleLibreAlarm-${VERSION}.apk

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/release/*.apk"
          generateReleaseNotes: true
          draft: false
